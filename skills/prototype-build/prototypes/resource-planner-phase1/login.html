<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Resource Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f5f0; --card: #ffffff; --fg: #1a1a1a;
      --primary: #d95f2b; --secondary: #4a1f1f;
      --muted: #f0ede8; --muted-fg: #888888; --border: #e5e1da;
      --success: #3d9a6b; --success-light: #edf7f2;
      --warning: #c98b0a; --warning-light: #fef9ec;
      --error: #c0392b; --error-light: #fdf1ec;
      --info: #2563aa; --info-light: #eff6ff;
      --radius: 0.75rem;
    }
    body {
      background: var(--bg); color: var(--fg);
      font-family: 'Inter', sans-serif; font-size: 14px;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .wrap { width: 100%; max-width: 440px; padding: 24px; }
    .logo { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 30px; color: var(--secondary); margin-bottom: 4px; line-height: 1; }
    .logo span { color: var(--primary); }
    .tagline { font-size: 13px; color: var(--muted-fg); margin-bottom: 36px; }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 36px;
      box-shadow: 0 4px 28px rgba(0,0,0,0.06);
    }
    .card-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 22px; color: var(--secondary); margin-bottom: 6px; }
    .card-sub { font-size: 13px; color: var(--muted-fg); margin-bottom: 28px; line-height: 1.5; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* Google button */
    .g-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 13px 16px;
      background: #fff; border: 1px solid #dadce0; border-radius: 4px;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; color: #3c4043;
      cursor: pointer; transition: background 0.15s, box-shadow 0.15s; text-align: center;
    }
    .g-btn:hover { background: #f8f9fa; box-shadow: 0 1px 4px rgba(0,0,0,0.12); }

    /* Error box */
    .error-box {
      margin-top: 16px; padding: 14px 16px;
      background: var(--error-light); border: 1px solid rgba(192,57,43,0.2);
      border-radius: 8px; font-size: 13px; color: var(--error); line-height: 1.6;
    }
    .error-box strong { font-weight: 600; display: block; margin-bottom: 4px; }
    .error-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .error-tab {
      padding: 4px 10px; font-size: 11px; border-radius: 4px; border: 1px solid;
      cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.1s;
    }

    /* Loading */
    .loading-box {
      margin-top: 16px; padding: 12px 14px; background: var(--muted);
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 13px; color: var(--muted-fg); display: flex; align-items: center; gap: 10px;
    }
    .spinner {
      width: 16px; height: 16px; border: 2px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Role indicator (non-error scenarios) */
    .role-indicator {
      margin-top: 14px; padding: 10px 14px;
      background: var(--success-light); border: 1px solid rgba(61,154,107,0.25);
      border-radius: 8px; font-size: 12px; color: var(--success);
      display: flex; align-items: center; gap: 8px;
    }

    /* Admin login */
    .admin-toggle-row { margin-top: 18px; text-align: center; }
    .admin-link { font-size: 12px; color: var(--muted-fg); cursor: pointer; text-decoration: underline; background: none; border: none; font-family: inherit; }
    .admin-link:hover { color: var(--fg); }
    .admin-form { margin-top: 14px; display: none; }
    .admin-form label { font-size: 12px; color: var(--muted-fg); display: block; margin-bottom: 6px; }
    .admin-form input {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 6px; font-family: inherit; font-size: 13px; outline: none;
      transition: border-color 0.15s;
    }
    .admin-form input:focus { border-color: var(--primary); }
    .admin-submit {
      margin-top: 10px; width: 100%; padding: 10px;
      background: var(--secondary); color: #fff; border: none; border-radius: 6px;
      font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    .admin-submit:hover { background: #3a1818; }
  </style>
</head>
<body>

<!-- STATE PANEL TOGGLE -->
<button id="state-panel-toggle" onclick="togglePanel()"
  title="State Panel"
  style="position:fixed;top:50%;right:0;transform:translateY(-50%);
         background:#1a1a2e;color:#e5e7eb;border:none;
         border-radius:8px 0 0 8px;padding:10px 14px;
         cursor:pointer;z-index:9999;font-size:12px;
         font-family:system-ui,sans-serif;font-weight:600;letter-spacing:0.04em;
         box-shadow:-2px 0 8px rgba(0,0,0,0.3)">⚙ State</button>

<!-- STATE PANEL -->
<div id="state-panel"
  style="display:none;position:fixed;top:0;right:0;width:280px;height:100vh;
         background:#1a1a2e;color:#e5e7eb;overflow-y:auto;z-index:9998;
         box-shadow:-4px 0 24px rgba(0,0,0,0.35);padding:16px 14px;
         font-family:system-ui,sans-serif;box-sizing:border-box;">

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
    <span style="font-weight:600;font-size:13px;color:#f9fafb">⚙ State Panel</span>
    <button onclick="togglePanel()" style="background:none;border:none;color:#9ca3af;cursor:pointer;font-size:22px;line-height:1">×</button>
  </div>

  <div style="margin-bottom:20px">
    <p style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;font-weight:600">Scenarios — Login</p>
    <div id="panel-scenarios" style="display:flex;flex-direction:column;gap:4px"></div>
  </div>
</div>

<!-- LOGIN -->
<div class="wrap">
  <div class="logo">Halo.<span>Resource</span></div>
  <div class="tagline">Workforce intelligence platform</div>

  <div class="card">
    <div class="card-title">Sign in</div>
    <div class="card-sub">Use your @halopowered.com Google account to continue.</div>
    <div id="screen-content"></div>

    <hr class="divider">
    <div class="admin-toggle-row">
      <button class="admin-link" onclick="toggleAdmin()">Admin / emergency login</button>
    </div>
    <div id="admin-form" class="admin-form">
      <label for="admin-pw">Admin password</label>
      <input id="admin-pw" type="password" placeholder="Enter admin password"
        onkeydown="if(event.key==='Enter')doAdminLogin()">
      <button class="admin-submit" onclick="doAdminLogin()">Sign in as Admin</button>
    </div>
  </div>
</div>

<script>
/* ── SCREEN DATA ── */
var SCREEN_DATA = {
  login_as_dl: {
    role: 'DELIVERY_LEAD',
    label: 'Login as Delivery Lead',
    frs: ['AUTH-3', 'AUTH-4'],
    data: { state: 'ready', email: 'james.whitfield@halopowered.com' }
  },
  login_as_hr: {
    role: 'HR',
    label: 'Login as HR / People',
    frs: ['AUTH-3', 'AUTH-4'],
    data: { state: 'ready', email: 'naomi.adler@halopowered.com' }
  },
  login_as_admin: {
    role: 'ADMIN',
    label: 'Login as Admin',
    frs: ['AUTH-3', 'AUTH-4'],
    data: { state: 'ready', email: 'admin@halopowered.com' }
  },
  login_error: {
    role: 'DELIVERY_LEAD',
    label: 'Login errors (3 states)',
    frs: ['AUTH-3'],
    data: { state: 'error', errorType: 'wrong-domain' }
  }
}

var SCENARIOS = [
  { key: 'login_as_dl',    label: 'Login as Delivery Lead',    role: 'DELIVERY_LEAD' },
  { key: 'login_as_hr',    label: 'Login as HR / People',      role: 'HR' },
  { key: 'login_as_admin', label: 'Login as Admin',            role: 'ADMIN' },
  { key: 'login_error',    label: 'Login errors (3 states)',   role: 'DELIVERY_LEAD' }
]

var DEFAULT_PAGE = {
  'DELIVERY_LEAD': 'project-composition.html',
  'HR': 'resource-directory.html',
  'ADMIN': 'access-control.html'
}

var ROLE_LABELS = {
  'DELIVERY_LEAD': 'Delivery Lead',
  'HR': 'HR / People',
  'ADMIN': 'Admin'
}

/* ── STATE ── */
var params = new URLSearchParams(location.search)
var S = { scenario: params.get('scenario') || 'login_as_dl', role: null }
var _sc0 = SCREEN_DATA[S.scenario] || SCREEN_DATA['login_as_dl']
S.role = _sc0.role

/* ── STATE PANEL ── */
var panelOpen = false
function togglePanel() {
  panelOpen = !panelOpen
  document.getElementById('state-panel').style.display = panelOpen ? 'block' : 'none'
}

function renderPanel() {
  var el = document.getElementById('panel-scenarios')
  if (!el) return
  el.innerHTML = SCENARIOS.map(function(sc) {
    var active = sc.key === S.scenario
    return '<button onclick="setScenario(\'' + sc.key + '\')" style="padding:8px 11px;border-radius:6px;border:none;cursor:pointer;font-size:12px;text-align:left;width:100%;line-height:1.4;' +
      (active ? 'background:rgba(255,255,255,0.15);color:#f9fafb;font-weight:600' : 'background:transparent;color:#9ca3af') +
      '">' + sc.label + '</button>'
  }).join('')
}

function setScenario(key) {
  var sc = SCREEN_DATA[key]
  if (!sc) return
  S.scenario = key
  S.role = sc.role
  localStorage.setItem('rp_role', sc.role)
  history.replaceState(null, '', '?scenario=' + key)
  renderPanel()
  renderScreen()
}

function getData() {
  var sc = SCREEN_DATA[S.scenario]
  return sc ? sc.data : {}
}

/* ── RENDER SCREEN ── */
var _currentError = 'wrong-domain'

var ERROR_MSGS = {
  'wrong-domain': {
    title: 'Account domain not allowed',
    body: 'Only @halopowered.com accounts may access this platform. You signed in with an external Google account.'
  },
  'not-in-system': {
    title: 'Account not found',
    body: 'Your @halopowered.com account was not found in the workforce system. Contact your NetSuite administrator to ensure you are set up as an active resource.'
  },
  'no-role': {
    title: 'No role assigned',
    body: 'Your account exists but has no platform role assigned. Ask your admin to assign your role (Delivery Lead, HR, etc.) in NetSuite.'
  }
}

var ERROR_TAB_LABELS = {
  'wrong-domain': 'Wrong domain',
  'not-in-system': 'Not in system',
  'no-role': 'No role assigned'
}

function renderScreen() {
  var data = getData()
  var el = document.getElementById('screen-content')
  if (!el) return

  var gBtn = '<button class="g-btn" onclick="handleGoogleLogin()">' + googleSVG() + 'Sign in with Google</button>'

  if (data.state === 'loading') {
    el.innerHTML = '<button class="g-btn" style="opacity:0.5;cursor:not-allowed">' + googleSVG() + 'Signing in…</button>' +
      '<div class="loading-box"><div class="spinner"></div>Waiting for Google authentication…</div>'
    return
  }

  if (data.state === 'error') {
    _currentError = data.errorType || 'wrong-domain'
    var tabs = ['wrong-domain', 'not-in-system', 'no-role'].map(function(t) {
      var active = t === _currentError
      return '<button class="error-tab" onclick="switchErrorType(\'' + t + '\')" style="' +
        (active ? 'background:var(--error);color:#fff;border-color:var(--error)' : 'background:#fff;color:var(--muted-fg);border-color:var(--border)') +
        '">' + ERROR_TAB_LABELS[t] + '</button>'
    }).join('')
    var msg = ERROR_MSGS[_currentError]
    el.innerHTML = gBtn +
      '<div class="error-box"><div class="error-tabs">' + tabs + '</div>' +
      '<strong>' + msg.title + '</strong>' + msg.body + '</div>'
    return
  }

  /* default: ready */
  var roleLabel = ROLE_LABELS[S.role] || S.role
  el.innerHTML = gBtn +
    '<div class="role-indicator">' +
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' +
      'Scenario: will sign in as <strong style="margin-left:4px">' + roleLabel + '</strong>' +
    '</div>'
}

function switchErrorType(type) {
  var sc = SCREEN_DATA[S.scenario]
  if (sc && sc.data) sc.data.errorType = type
  _currentError = type
  renderScreen()
}

function googleSVG() {
  return '<svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">' +
    '<path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>' +
    '<path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>' +
    '<path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>' +
    '<path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>' +
  '</svg>'
}

function handleGoogleLogin() {
  localStorage.setItem('rp_role', S.role)
  localStorage.setItem('rp_email', SCREEN_DATA[S.scenario].data.email || 'user@halopowered.com')
  location.href = DEFAULT_PAGE[S.role] || 'resource-directory.html'
}

function doAdminLogin() {
  var pw = document.getElementById('admin-pw')
  if (pw && pw.value.length > 0) {
    localStorage.setItem('rp_role', 'ADMIN')
    localStorage.setItem('rp_email', 'admin@halopowered.com')
    location.href = 'access-control.html'
  }
}

function toggleAdmin() {
  var f = document.getElementById('admin-form')
  if (!f) return
  f.style.display = f.style.display === 'block' ? 'none' : 'block'
}

document.addEventListener('DOMContentLoaded', function() {
  renderPanel()
  renderScreen()
})
</script>
</body>
</html>
