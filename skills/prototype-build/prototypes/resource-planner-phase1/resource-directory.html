<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resource Directory — Resource Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f5f0; --card: #ffffff; --fg: #1a1a1a;
      --primary: #d95f2b; --secondary: #4a1f1f;
      --muted: #f0ede8; --muted-fg: #888888; --border: #e5e1da;
      --success: #3d9a6b; --success-light: #edf7f2;
      --warning: #c98b0a; --warning-light: #fef9ec;
      --error: #c0392b; --error-light: #fdf1ec;
      --info: #2563aa; --info-light: #eff6ff;
      --sidebar-from: #3b1f4a; --sidebar-to: #4a1f1f;
      --sidebar-w: 224px;
      --header-h: 56px;
      --radius: 0.75rem;
    }
    body { background: var(--bg); color: var(--fg); font-family: 'Inter', sans-serif; font-size: 14px; }

    /* ── SIDEBAR ── */
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w);
      background: linear-gradient(180deg, var(--sidebar-from), var(--sidebar-to));
      display: flex; flex-direction: column; z-index: 100; transition: width 0.2s;
    }
    #sidebar.collapsed { width: 56px; }
    .sidebar-logo {
      padding: 20px 18px 14px;
      font-family: 'Playfair Display', serif; font-weight: 700; font-size: 18px; color: #fff;
      border-bottom: 1px solid rgba(255,255,255,0.1); white-space: nowrap; overflow: hidden;
    }
    .sidebar-logo span { color: #e87a4a; }
    #sidebar.collapsed .sidebar-logo-text { display: none; }
    .sidebar-role {
      padding: 10px 14px 6px;
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: rgba(255,255,255,0.45);
      white-space: nowrap; overflow: hidden;
    }
    #sidebar.collapsed .sidebar-role { display: none; }
    #sidebar-nav { flex: 1; padding: 6px 8px; overflow-y: auto; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 10px;
      border-radius: 7px; color: rgba(255,255,255,0.65); text-decoration: none;
      font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; overflow: hidden;
      transition: background 0.15s, color 0.15s; margin-bottom: 2px;
    }
    .nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.18); color: #fff; font-weight: 600; }
    .nav-item.locked { cursor: default; opacity: 0.45; }
    .nav-item.locked:hover { background: none; color: rgba(255,255,255,0.45); }
    .nav-icon { flex-shrink: 0; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; }
    #sidebar.collapsed .nav-label { display: none; }
    #sidebar.collapsed .nav-lock { display: none; }
    .nav-lock { margin-left: auto; flex-shrink: 0; }
    .sidebar-footer {
      padding: 12px 14px; border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 11px; color: rgba(255,255,255,0.5); white-space: nowrap; overflow: hidden;
    }
    .sidebar-footer strong { display: block; color: rgba(255,255,255,0.7); font-size: 12px; margin-bottom: 6px; }
    #sidebar.collapsed .sidebar-footer-text { display: none; }
    .sidebar-logout {
      display: flex; align-items: center; gap: 6px; margin-top: 6px;
      color: rgba(255,255,255,0.45); cursor: pointer; text-decoration: none; font-size: 12px;
    }
    .sidebar-logout:hover { color: rgba(255,255,255,0.8); }
    #sidebar.collapsed .sidebar-logout span { display: none; }

    /* ── HEADER ── */
    #header {
      position: fixed; top: 0; left: var(--sidebar-w); right: 0; height: var(--header-h);
      background: var(--card); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px; gap: 16px; z-index: 99;
      transition: left 0.2s;
    }
    #header.collapsed { left: 56px; }
    .header-toggle {
      background: none; border: none; cursor: pointer; color: var(--muted-fg); padding: 4px;
      border-radius: 4px; display: flex; align-items: center; transition: color 0.15s;
    }
    .header-toggle:hover { color: var(--fg); }
    #header-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--secondary); flex: 1; }
    .sync-badges { display: flex; gap: 8px; align-items: center; }
    .sync-badge {
      display: flex; align-items: center; gap: 5px; padding: 4px 10px;
      background: var(--success-light); border: 1px solid rgba(61,154,107,0.2);
      border-radius: 20px; font-size: 11px; color: var(--success); font-weight: 500;
    }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
    .header-user { font-size: 12px; color: var(--muted-fg); }

    /* ── MAIN ── */
    #main {
      margin-left: var(--sidebar-w); padding-top: var(--header-h);
      transition: margin-left 0.2s; min-height: 100vh;
    }
    #main.collapsed { margin-left: 56px; }
    .content { padding: 24px; max-width: 1400px; }

    /* ── KPI CARDS ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .kpi-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px 18px;
    }
    .kpi-label { font-size: 11px; color: var(--muted-fg); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .kpi-value { font-size: 24px; font-weight: 700; color: var(--fg); line-height: 1; margin-bottom: 4px; }
    .kpi-value.warn { color: var(--warning); }
    .kpi-value.danger { color: var(--error); }
    .kpi-trend { font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .trend-up { color: var(--error); }
    .trend-down { color: var(--success); }
    .trend-neutral { color: var(--muted-fg); }

    /* ── DEPT BREAKDOWN ── */
    .section-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 20px; overflow: hidden;
    }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; cursor: pointer; user-select: none;
      border-bottom: 1px solid var(--border);
    }
    .section-header:hover { background: var(--muted); }
    .section-title { font-size: 13px; font-weight: 600; color: var(--fg); }
    .section-body { padding: 18px; }
    .chevron { transition: transform 0.2s; }
    .chevron.open { transform: rotate(180deg); }

    /* ── FILTER BAR ── */
    .filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-pill {
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      font-size: 12px; font-weight: 500; cursor: pointer; background: var(--card);
      color: var(--muted-fg); transition: all 0.15s; white-space: nowrap;
    }
    .filter-pill:hover { border-color: var(--primary); color: var(--primary); }
    .filter-pill.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .filter-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .search-input {
      padding: 7px 12px; border: 1px solid var(--border); border-radius: 6px;
      font-family: inherit; font-size: 13px; outline: none; width: 200px;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--primary); }
    .filter-select {
      padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
      font-family: inherit; font-size: 12px; background: var(--card); cursor: pointer; outline: none;
    }

    /* ── TABLE ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted-fg);
      border-bottom: 1px solid var(--border); white-space: nowrap;
      cursor: pointer; user-select: none;
    }
    thead th:hover { color: var(--fg); }
    thead th.sorted { color: var(--primary); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:hover { background: var(--muted); }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 11px 12px; vertical-align: middle; }
    .resource-name { font-weight: 600; color: var(--fg); }
    .resource-name a { color: var(--fg); text-decoration: none; }
    .resource-name a:hover { color: var(--primary); text-decoration: underline; }
    .resource-meta { font-size: 11px; color: var(--muted-fg); margin-top: 2px; }
    .type-badge {
      display: inline-block; padding: 2px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 500; white-space: nowrap;
    }
    .type-fte { background: var(--info-light); color: var(--info); }
    .type-contractor { background: #f3e8ff; color: #7c3aed; }
    .type-consultant { background: var(--warning-light); color: var(--warning); }
    .util-bar-wrap { display: flex; align-items: center; gap: 8px; min-width: 100px; }
    .util-bar { flex: 1; height: 5px; background: var(--muted); border-radius: 3px; overflow: hidden; }
    .util-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .util-pct { font-size: 12px; font-weight: 600; min-width: 36px; }
    .status-badge {
      display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .status-idle { background: var(--error-light); color: var(--error); }
    .status-partial { background: var(--warning-light); color: var(--warning); }
    .status-healthy { background: var(--success-light); color: var(--success); }
    .status-over { background: #fce7f3; color: #be185d; }
    .conflict-flag { color: var(--error); font-weight: 600; font-size: 11px; margin-left: 4px; }
    .idle-cost { font-weight: 600; font-size: 13px; }
    .idle-cost.high { color: var(--error); }
    .idle-cost.med { color: var(--warning); }

    /* ── PAGINATION ── */
    .pagination { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-top: 1px solid var(--border); }
    .pagination-info { font-size: 12px; color: var(--muted-fg); }
    .pagination-btns { display: flex; gap: 6px; }
    .page-btn {
      padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px;
      font-family: inherit; font-size: 12px; cursor: pointer; background: var(--card);
      color: var(--fg); transition: all 0.15s;
    }
    .page-btn:hover:not(:disabled) { background: var(--muted); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* ── CONFLICTS ── */
    .conflict-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .conflict-row:last-child { border-bottom: none; padding-bottom: 0; }
    .conflict-icon { color: var(--error); flex-shrink: 0; margin-top: 2px; }
    .conflict-name { font-weight: 600; font-size: 13px; }
    .conflict-desc { font-size: 12px; color: var(--muted-fg); margin-top: 3px; line-height: 1.5; }

    /* ── EMPTY STATE ── */
    .empty-state { padding: 60px 24px; text-align: center; }
    .empty-state-icon { width: 56px; height: 56px; border-radius: 50%; background: var(--muted); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .empty-state-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
    .empty-state-sub { font-size: 13px; color: var(--muted-fg); }

    /* ── ROLE SCOPE BANNER ── */
    .scope-banner {
      display: flex; align-items: center; gap: 10px; padding: 10px 16px;
      background: var(--info-light); border: 1px solid rgba(37,99,170,0.2);
      border-radius: 8px; margin-bottom: 16px; font-size: 12px; color: var(--info);
    }
  </style>
</head>

/* ── STATE ── */
var params = new URLSearchParams(location.search)
var S = { scenario: params.get('scenario') || 'dir_hr_populated', role: null }
var _sc0 = SCREEN_DATA[S.scenario] || SCREEN_DATA['dir_hr_populated']
S.role = localStorage.getItem('rp_role') || _sc0.role

var sidebarCollapsed = false
var deptChartInstance = null

/* ── PANEL ── */
var panelOpen = false
function togglePanel() {
  panelOpen = !panelOpen
  document.getElementById('state-panel').style.display = panelOpen ? 'block' : 'none'
}

function renderPanel() {
  var scenEl = document.getElementById('panel-scenarios')
  if (scenEl) {
    scenEl.innerHTML = SCENARIOS.map(function(sc) {
      var active = sc.key === S.scenario
      return '<button onclick="setScenario(\'' + sc.key + '\')" style="padding:8px 11px;border-radius:6px;border:none;cursor:pointer;font-size:12px;text-align:left;width:100%;line-height:1.4;' +
        (active ? 'background:rgba(255,255,255,0.15);color:#f9fafb;font-weight:600' : 'background:transparent;color:#9ca3af') +
        '">' + sc.label + '</button>'
    }).join('')
  }
  var rolesEl = document.getElementById('panel-roles')
  if (rolesEl) {
    rolesEl.innerHTML = Object.keys(ROLE_LABELS).map(function(r) {
      var active = r === S.role
      return '<button onclick="overrideRole(\'' + r + '\')" style="padding:5px 9px;border-radius:5px;border:1px solid;cursor:pointer;font-size:11px;' +
        (active ? 'background:rgba(255,255,255,0.15);color:#f9fafb;border-color:rgba(255,255,255,0.2);font-weight:600' : 'background:transparent;color:#6b7280;border-color:rgba(255,255,255,0.08)') +
        '">' + ROLE_LABELS[r] + '</button>'
    }).join('')
  }
}

function setScenario(key) {
  var sc = SCREEN_DATA[key]
  if (!sc) return
  S.scenario = key; S.role = sc.role
  localStorage.setItem('rp_role', sc.role)
  history.replaceState(null, '', '?scenario=' + key)
  renderPanel(); renderSidebar(); renderScreen()
}

function overrideRole(role) {
  S.role = role
  localStorage.setItem('rp_role', role)
  renderPanel(); renderSidebar(); renderScreen()
}

function getData() {
  var sc = SCREEN_DATA[S.scenario]
  return sc ? Object.assign({}, sc.data) : { filter:'all', search:'', sortBy:'name', sortDir:'asc', page:1 }
}

/* ── SIDEBAR ── */
function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed
  document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed)
  document.getElementById('header').classList.toggle('collapsed', sidebarCollapsed)
  document.getElementById('main').classList.toggle('collapsed', sidebarCollapsed)
}

function renderSidebar() {
  var items = NAV_CONFIG[S.role] || NAV_CONFIG['HR']
  var html = items.map(function(item) {
    var isActive = item.file === 'resource-directory.html'
    var icon = NAV_ICONS[item.icon] || ''
    if (item.locked) {
      return '<div class="nav-item locked"><span class="nav-icon">' + icon + '</span><span class="nav-label">' + item.label + '</span>' +
        '<span class="nav-lock"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span></div>'
    }
    return '<a class="nav-item' + (isActive ? ' active' : '') + '" href="' + item.file + '">' +
      '<span class="nav-icon">' + icon + '</span><span class="nav-label">' + item.label + '</span></a>'
  }).join('')
  document.getElementById('sidebar-nav').innerHTML = html
  document.getElementById('sidebar-role-label').textContent = ROLE_LABELS[S.role] || S.role
  var email = localStorage.getItem('rp_email') || (S.role === 'HR' ? 'naomi.adler@halopowered.com' : S.role === 'ADMIN' ? 'admin@halopowered.com' : 'james.whitfield@halopowered.com')
  document.getElementById('sidebar-email').textContent = email
  document.getElementById('header-user').textContent = email
}

/* ── VIEW STATE ── */
var _viewState = {}

function getViewState() {
  var sc = SCREEN_DATA[S.scenario]
  if (!_viewState[S.scenario]) {
    _viewState[S.scenario] = Object.assign({}, sc ? sc.data : {})
  }
  return _viewState[S.scenario]
}

/* ── RENDER SCREEN ── */
function renderScreen() {
  var vs = getViewState()
  var el = document.getElementById('screen-content')
  if (!el) return
  if (deptChartInstance) { deptChartInstance.destroy(); deptChartInstance = null }

  /* get filtered resource list */
  var resources = ALL_RESOURCES.slice()
  if (vs.scoped || S.role === 'DELIVERY_LEAD') {
    resources = resources.filter(function(r) { return DL_SCOPED_IDS.indexOf(r.id) !== -1 })
  }
  if (vs.filter && vs.filter !== 'all') {
    if (vs.filter === 'conflict') {
      resources = resources.filter(function(r) { return r.conflict })
    } else {
      resources = resources.filter(function(r) { return r.status === vs.filter })
    }
  }
  if (vs.search) {
    var q = vs.search.toLowerCase()
    resources = resources.filter(function(r) {
      return r.name.toLowerCase().indexOf(q) !== -1 || r.role.toLowerCase().indexOf(q) !== -1 || r.dept.toLowerCase().indexOf(q) !== -1
    })
  }
  /* sort */
  resources.sort(function(a, b) {
    var dir = vs.sortDir === 'asc' ? 1 : -1
    if (vs.sortBy === 'name') return a.name.localeCompare(b.name) * dir
    if (vs.sortBy === 'alloc') return (a.alloc - b.alloc) * dir
    if (vs.sortBy === 'idleCost') return (a.idleCost - b.idleCost) * dir
    if (vs.sortBy === 'status') return a.status.localeCompare(b.status) * dir
    return 0
  })

  var PAGE_SIZE = 8
  var totalPages = Math.ceil(resources.length / PAGE_SIZE) || 1
  var page = Math.min(vs.page || 1, totalPages)
  var paged = resources.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE)

  var isHR = S.role === 'HR'
  var orgData = buildOrgMetrics(S.role === 'DELIVERY_LEAD')
  var depts = buildDeptData(S.role === 'DELIVERY_LEAD')

  /* scope banner for DL */
  var scopeBanner = ''
  if (S.role === 'DELIVERY_LEAD') {
    scopeBanner = '<div class="scope-banner"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
      'Showing resources scoped to your active projects. HR and Admin see the full directory.</div>'
  }

  /* KPI cards */
  var kpiHtml = isHR ? buildKpiCards(orgData) : ''

  /* dept breakdown */
  var deptHtml = isHR ? buildDeptSection(vs.deptOpen, depts) : ''

  /* filter bar */
  var filterHtml = buildFilterBar(vs, resources.length, ALL_RESOURCES.length)

  /* empty state */
  if (vs.empty) {
    el.innerHTML = scopeBanner + kpiHtml +
      '<div class="section-card">' +
        '<div class="empty-state">' +
          '<div class="empty-state-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--muted-fg)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>' +
          '<div class="empty-state-title">No resources found</div>' +
          '<div class="empty-state-sub">Workforce data hasn\'t synced yet. Check your Deel and NetSuite connection in Settings.</div>' +
        '</div>' +
      '</div>'
    return
  }

  /* resource table */
  var tableHtml = buildTable(paged, vs)
  var paginationHtml = buildPagination(page, totalPages, paged.length, resources.length)

  /* conflicts section */
  var conflictsData = S.role === 'DELIVERY_LEAD' ? CONFLICTS_DATA.filter(function(c) { return c.resource === 'James Whitfield' }) : CONFLICTS_DATA
  var conflictHtml = conflictsData.length > 0 ? buildConflictsSection(conflictsData, vs.conflictOpen) : ''

  el.innerHTML = scopeBanner + kpiHtml + deptHtml +
    '<div class="section-card">' +
      filterHtml +
      '<div class="table-wrap">' + tableHtml + '</div>' +
      (resources.length === 0 ? '<div class="empty-state"><div class="empty-state-title">No resources match this filter</div><div class="empty-state-sub">Try clearing the search or selecting a different filter.</div></div>' : '') +
      paginationHtml +
    '</div>' +
    conflictHtml

  /* wire dept chart after DOM ready */
  if (isHR && vs.deptOpen) {
    setTimeout(function() { renderDeptChart(depts) }, 50)
  }
}

/* ── HELPERS ── */
function buildOrgMetrics(isDL) {
  if (isDL) return { headcount:7, billable:74, idle:11, idleCost:14480, over:1, prev:{billable:71,idle:14} }
  return { headcount:47, billable:68, idle:20, idleCost:48200, over:2, prev:{billable:71,idle:17} }
}

function buildDeptData(isDL) {
  if (isDL) return [{ name:'Engineering', billable:76, nonBillable:12, trueIdle:12, count:5 }, { name:'Project Mgmt', billable:70, nonBillable:15, trueIdle:15, count:2 }]
  return [
    { name:'Engineering',       billable:74, nonBillable:10, trueIdle:16, count:18 },
    { name:'Design',            billable:62, nonBillable:18, trueIdle:20, count:6 },
    { name:'Project Mgmt',      billable:71, nonBillable:15, trueIdle:14, count:8 },
    { name:'Strategy & Analytics', billable:58, nonBillable:14, trueIdle:28, count:9 },
    { name:'Operations',        billable:50, nonBillable:30, trueIdle:20, count:6 }
  ]
}

function buildKpiCards(d) {
  var billableTrend = d.billable < d.prev.billable ? '<span class="trend-down">▼ ' + (d.prev.billable - d.billable) + '% vs last period</span>' : '<span class="trend-up">▲ ' + (d.billable - d.prev.billable) + '% vs last period</span>'
  var idleTrend = d.idle > d.prev.idle ? '<span class="trend-up">▲ +' + (d.idle - d.prev.idle) + '% vs last period</span>' : '<span class="trend-down">▼ ' + (d.prev.idle - d.idle) + '% vs last period</span>'
  return '<div class="kpi-grid">' +
    kpiCard('Total Headcount', d.headcount, '', '') +
    kpiCard('Billable Utilization', d.billable + '%', d.billable < 75 ? 'warn' : '', billableTrend) +
    kpiCard('True Idle Rate', d.idle + '%', d.idle > 15 ? 'danger' : 'warn', idleTrend) +
    kpiCard('Idle Cost (Est.)', '$' + d.idleCost.toLocaleString(), d.idleCost > 30000 ? 'danger' : 'warn', '<span class="trend-neutral">This week</span>') +
  '</div>'
}

function kpiCard(label, val, cls, trend) {
  return '<div class="kpi-card"><div class="kpi-label">' + label + '</div><div class="kpi-value ' + cls + '">' + val + '</div><div class="kpi-trend">' + trend + '</div></div>'
}

function buildDeptSection(open, depts) {
  var chevron = '<svg class="chevron ' + (open ? 'open' : '') + '" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>'
  var body = open ? '<div class="section-body" id="dept-body"><canvas id="dept-chart" height="120"></canvas></div>' : '<div id="dept-body" style="display:none"><div class="section-body"><canvas id="dept-chart" height="120"></canvas></div></div>'
  return '<div class="section-card" style="margin-bottom:20px">' +
    '<div class="section-header" onclick="toggleSection(\'dept\')">' +
      '<span class="section-title">Department Breakdown</span>' + chevron +
    '</div>' +
    (open ? '<div class="section-body" id="dept-body"><canvas id="dept-chart" height="120"></canvas></div>' : '<div id="dept-body" style="display:none"><div class="section-body"><canvas id="dept-chart" height="120"></canvas></div></div>') +
  '</div>'
}

function toggleSection(id) {
  var vs = getViewState()
  if (id === 'dept') {
    vs.deptOpen = !vs.deptOpen
    var body = document.getElementById('dept-body')
    var svg = document.querySelector('#dept-body').previousElementSibling.querySelector('.chevron')
    if (body) body.style.display = vs.deptOpen ? '' : 'none'
    if (svg) svg.classList.toggle('open', vs.deptOpen)
    if (vs.deptOpen) {
      var depts = buildDeptData(S.role === 'DELIVERY_LEAD')
      setTimeout(function() { renderDeptChart(depts) }, 30)
    }
  }
  if (id === 'conflict') {
    vs.conflictOpen = !vs.conflictOpen
    var cbody = document.getElementById('conflict-body')
    var csvg = document.getElementById('conflict-chevron')
    if (cbody) cbody.style.display = vs.conflictOpen ? '' : 'none'
    if (csvg) csvg.classList.toggle('open', vs.conflictOpen)
  }
}

function renderDeptChart(depts) {
  var canvas = document.getElementById('dept-chart')
  if (!canvas) return
  if (deptChartInstance) { deptChartInstance.destroy(); deptChartInstance = null }
  var ctx = canvas.getContext('2d')
  deptChartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: depts.map(function(d) { return d.name }),
      datasets: [
        { label: 'Billable', data: depts.map(function(d) { return d.billable }), backgroundColor: '#3d9a6b', borderRadius: 2 },
        { label: 'Non-billable', data: depts.map(function(d) { return d.nonBillable }), backgroundColor: '#c98b0a', borderRadius: 2 },
        { label: 'True Idle', data: depts.map(function(d) { return d.trueIdle }), backgroundColor: '#c0392b', borderRadius: 2 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { stacked: true, grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { stacked: true, max: 100, ticks: { callback: function(v) { return v + '%' }, font: { size: 11 } }, grid: { color: '#e5e1da' } }
      },
      plugins: { legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12 } }, tooltip: { callbacks: { label: function(ctx) { return ctx.dataset.label + ': ' + ctx.raw + '%' } } } }
    }
  })
}

function buildFilterBar(vs, filteredCount, totalCount) {
  var filters = [
    { key:'all',             label:'All (' + totalCount + ')' },
    { key:'truly-idle',      label:'Truly Idle' },
    { key:'partially-allocated', label:'Under-utilized' },
    { key:'fully-booked',    label:'Healthy' },
    { key:'over-allocated',  label:'Over-allocated' },
    { key:'conflict',        label:'Conflict' }
  ]
  var pills = filters.map(function(f) {
    return '<button class="filter-pill' + (vs.filter === f.key ? ' active' : '') + '" onclick="setFilter(\'' + f.key + '\')">' + f.label + '</button>'
  }).join('')
  return '<div class="filter-bar" style="padding:14px 18px;border-bottom:1px solid var(--border)">' +
    pills +
    '<div class="filter-right">' +
      '<input class="search-input" type="text" placeholder="Search resources…" value="' + (vs.search || '') + '" oninput="setSearch(this.value)">' +
      '<select class="filter-select" onchange="setDeptFilter(this.value)">' +
        '<option value="">All departments</option>' +
        '<option value="Engineering">Engineering</option>' +
        '<option value="Design">Design</option>' +
        '<option value="Project Management">Project Mgmt</option>' +
        '<option value="Strategy & Analytics">Strategy</option>' +
        '<option value="Operations">Operations</option>' +
      '</select>' +
    '</div>' +
  '</div>'
}

function setFilter(key) {
  var vs = getViewState()
  vs.filter = key; vs.page = 1
  renderScreen()
}

function setSearch(val) {
  var vs = getViewState()
  vs.search = val; vs.page = 1
  renderScreen()
}

function setDeptFilter(val) {
  var vs = getViewState()
  vs.deptFilter = val; vs.page = 1
  renderScreen()
}

function buildTable(resources, vs) {
  if (resources.length === 0) return ''
  var sortArrow = function(col) {
    if (vs.sortBy !== col) return ' <span style="color:var(--border)">↕</span>'
    return vs.sortDir === 'asc' ? ' ↑' : ' ↓'
  }
  var thead = '<thead><tr>' +
    '<th class="' + (vs.sortBy==='name'?'sorted':'') + '" onclick="setSort(\'name\')">Name' + sortArrow('name') + '</th>' +
    '<th>Type</th>' +
    '<th class="' + (vs.sortBy==='alloc'?'sorted':'') + '" onclick="setSort(\'alloc\')" style="min-width:140px">Allocation' + sortArrow('alloc') + '</th>' +
    '<th>Billable %</th>' +
    '<th class="' + (vs.sortBy==='idleCost'?'sorted':'') + '" onclick="setSort(\'idleCost\')">Idle Cost' + sortArrow('idleCost') + '</th>' +
    '<th class="' + (vs.sortBy==='status'?'sorted':'') + '" onclick="setSort(\'status\')">Status' + sortArrow('status') + '</th>' +
    '<th>Projects</th>' +
    '</tr></thead>'
  var rows = resources.map(function(r) {
    var typeCls = r.type === 'FTE' ? 'type-fte' : r.type === 'Contractor' ? 'type-contractor' : 'type-consultant'
    var barColor = r.alloc > 100 ? '#be185d' : r.alloc >= 70 ? '#3d9a6b' : r.alloc >= 40 ? '#c98b0a' : '#c0392b'
    var barW = Math.min(r.alloc, 120)
    var statusCls = { 'truly-idle':'status-idle', 'partially-allocated':'status-partial', 'fully-booked':'status-healthy', 'over-allocated':'status-over' }[r.status] || 'status-partial'
    var statusLabel = { 'truly-idle':'Truly Idle', 'partially-allocated':'Under-utilized', 'fully-booked':'Healthy', 'over-allocated':'Over-allocated' }[r.status] || r.status
    var conflictFlag = r.conflict ? '<span class="conflict-flag" title="Scheduling conflict">⚠</span>' : ''
    var costCls = r.idleCost > 5000 ? 'high' : r.idleCost > 1000 ? 'med' : ''
    return '<tr>' +
      '<td><div class="resource-name"><a href="resource-profile.html?id=' + r.id + '">' + r.name + '</a>' + conflictFlag + '</div><div class="resource-meta">' + r.role + ' · ' + r.dept + ' · ' + r.seniority + '</div></td>' +
      '<td><span class="type-badge ' + typeCls + '">' + r.type + '</span></td>' +
      '<td><div class="util-bar-wrap"><div class="util-bar"><div class="util-bar-fill" style="width:' + barW + '%;background:' + barColor + '"></div></div><span class="util-pct" style="color:' + barColor + '">' + r.alloc + '%</span></div></td>' +
      '<td>' + r.billable + '%</td>' +
      '<td><span class="idle-cost ' + costCls + '">' + (r.idleCost > 0 ? '$' + r.idleCost.toLocaleString() : '—') + '</span></td>' +
      '<td><span class="status-badge ' + statusCls + '"><span class="status-dot" style="background:currentColor"></span>' + statusLabel + '</span></td>' +
      '<td>' + r.projects + '</td>' +
    '</tr>'
  }).join('')
  return '<table>' + thead + '<tbody>' + rows + '</tbody></table>'
}

function setSort(col) {
  var vs = getViewState()
  if (vs.sortBy === col) { vs.sortDir = vs.sortDir === 'asc' ? 'desc' : 'asc' }
  else { vs.sortBy = col; vs.sortDir = 'asc' }
  renderScreen()
}

function buildPagination(page, totalPages, shown, total) {
  if (total === 0) return ''
  var start = (page - 1) * 8 + 1
  var end = start + shown - 1
  var pages = []
  for (var i = 1; i <= totalPages; i++) pages.push(i)
  var pageBtns = pages.slice(Math.max(0, page-3), Math.min(totalPages, page+2)).map(function(p) {
    return '<button class="page-btn' + (p===page?' active':'') + '" onclick="goPage(' + p + ')">' + p + '</button>'
  }).join('')
  return '<div class="pagination">' +
    '<span class="pagination-info">Showing ' + start + '–' + end + ' of ' + total + ' resources</span>' +
    '<div class="pagination-btns">' +
      '<button class="page-btn" onclick="goPage(' + (page-1) + ')" ' + (page<=1?'disabled':'') + '>← Prev</button>' +
      pageBtns +
      '<button class="page-btn" onclick="goPage(' + (page+1) + ')" ' + (page>=totalPages?'disabled':'') + '>Next →</button>' +
    '</div>' +
  '</div>'
}

function goPage(p) {
  var vs = getViewState()
  vs.page = p
  renderScreen()
}

function buildConflictsSection(conflicts, open) {
  var chevron = '<svg id="conflict-chevron" class="chevron ' + (open ? 'open' : '') + '" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>'
  var rows = conflicts.map(function(c) {
    var sev = c.severity === 'high' ? '#c0392b' : '#c98b0a'
    return '<div class="conflict-row"><div class="conflict-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="' + sev + '" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>' +
      '<div><div class="conflict-name">' + c.resource + ' <span style="font-weight:400;font-size:12px;color:var(--muted-fg)">· ' + c.type + '</span></div>' +
      '<div class="conflict-desc">' + c.desc + '</div></div></div>'
  }).join('')
  return '<div class="section-card" style="margin-top:0">' +
    '<div class="section-header" onclick="toggleSection(\'conflict\')">' +
      '<span class="section-title" style="color:var(--error)">⚠ ' + conflicts.length + ' Scheduling Conflict' + (conflicts.length>1?'s':'') + '</span>' + chevron +
    '</div>' +
    '<div id="conflict-body" style="' + (open ? '' : 'display:none') + '">' +
      '<div class="section-body">' + rows + '</div>' +
    '</div>' +
  '</div>'
}

document.addEventListener('DOMContentLoaded', function() {
  renderPanel()
  renderSidebar()
  renderScreen()
})
</script>
</body>
</html>
