  <style>
    *, *::before, *::after { box-sizing:border-box;margin:0;padding:0; }
    :root {
      --bg:#f7f5f0;--card:#ffffff;--fg:#1a1a1a;
      --primary:#d95f2b;--secondary:#4a1f1f;
      --muted:#f0ede8;--muted-fg:#888888;--border:#e5e1da;
      --success:#3d9a6b;--success-light:#edf7f2;
      --warning:#c98b0a;--warning-light:#fef9ec;
      --error:#c0392b;--error-light:#fdf1ec;
      --info:#2563aa;--info-light:#eff6ff;
      --sidebar-from:#3b1f4a;--sidebar-to:#4a1f1f;
      --sidebar-w:224px;--header-h:56px;--radius:.75rem;
    }
    body { background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;font-size:14px; }
    /* sidebar */
    #sidebar { position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:linear-gradient(180deg,var(--sidebar-from),var(--sidebar-to));display:flex;flex-direction:column;z-index:100;transition:width .2s; }
    #sidebar.collapsed { width:56px; }
    .sidebar-logo { padding:20px 18px 14px;font-family:'Playfair Display',serif;font-weight:700;font-size:18px;color:#fff;border-bottom:1px solid rgba(255,255,255,.1);white-space:nowrap;overflow:hidden; }
    .sidebar-logo span { color:#e87a4a; }
    #sidebar.collapsed .sidebar-logo-text { display:none; }
    .sidebar-role { padding:10px 14px 6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.45);white-space:nowrap;overflow:hidden; }
    #sidebar.collapsed .sidebar-role { display:none; }
    #sidebar-nav { flex:1;padding:6px 8px;overflow-y:auto; }
    .nav-item { display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;color:rgba(255,255,255,.65);text-decoration:none;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;overflow:hidden;transition:background .15s,color .15s;margin-bottom:2px; }
    .nav-item:hover { background:rgba(255,255,255,.1);color:#fff; }
    .nav-item.active { background:rgba(255,255,255,.18);color:#fff;font-weight:600; }
    .nav-item.locked { cursor:default;opacity:.45; }
    .nav-item.locked:hover { background:none; }
    .nav-icon { flex-shrink:0;width:16px;height:16px;display:flex;align-items:center;justify-content:center; }
    #sidebar.collapsed .nav-label { display:none; }
    .sidebar-footer { padding:12px 14px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap;overflow:hidden; }
    .sidebar-footer strong { display:block;color:rgba(255,255,255,.7);font-size:12px;margin-bottom:6px; }
    #sidebar.collapsed .sidebar-footer-text { display:none; }
    .sidebar-logout { display:flex;align-items:center;gap:6px;margin-top:6px;color:rgba(255,255,255,.45);cursor:pointer;text-decoration:none;font-size:12px; }
    .sidebar-logout:hover { color:rgba(255,255,255,.8); }
    #sidebar.collapsed .sidebar-logout span { display:none; }
    /* header */
    #header { position:fixed;top:0;left:var(--sidebar-w);right:0;height:var(--header-h);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;z-index:99;transition:left .2s; }
    #header.collapsed { left:56px; }
    .header-toggle { background:none;border:none;cursor:pointer;color:var(--muted-fg);padding:4px;border-radius:4px;display:flex;align-items:center; }
    .header-toggle:hover { color:var(--fg); }
    .header-title { font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--secondary);flex:1; }
    .sync-badges { display:flex;gap:8px; }
    .sync-badge { display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--success-light);border:1px solid rgba(61,154,107,.2);border-radius:20px;font-size:11px;color:var(--success);font-weight:500; }
    .sync-dot { width:6px;height:6px;border-radius:50%;background:var(--success); }
    .header-user { font-size:12px;color:var(--muted-fg); }
    /* main */
    #main { margin-left:var(--sidebar-w);padding-top:var(--header-h);transition:margin-left .2s;min-height:100vh; }
    #main.collapsed { margin-left:56px; }
    .content { padding:24px;max-width:1300px; }
    /* tabs */
    .tabs { display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:24px; }
    .tab-btn { padding:10px 22px;font-family:inherit;font-size:13px;font-weight:500;background:none;border:none;cursor:pointer;color:var(--muted-fg);border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s; }
    .tab-btn:hover { color:var(--fg); }
    .tab-btn.active { color:var(--primary);border-bottom-color:var(--primary);font-weight:600; }
    /* alert banners */
    .alert-banner { display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:12px;line-height:1.5; }
    .alert-error { background:var(--error-light);border:1px solid rgba(192,57,43,.2);color:var(--error); }
    .alert-warn { background:var(--warning-light);border:1px solid rgba(201,139,10,.2);color:var(--warning); }
    /* table */
    .section-card { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;overflow:hidden; }
    .table-wrap { overflow-x:auto; }
    table { width:100%;border-collapse:collapse; }
    th { padding:10px 12px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-fg);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none; }
    th:hover { color:var(--fg); }
    th.sorted { color:var(--primary); }
    td { padding:11px 12px;vertical-align:middle;border-bottom:1px solid var(--border); }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--muted); }
    .project-name-link { font-weight:600;color:var(--fg);cursor:pointer;text-decoration:none; }
    .project-name-link:hover { color:var(--primary);text-decoration:underline; }
    .project-meta { font-size:11px;color:var(--muted-fg);margin-top:2px; }
    .type-badge { display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500; }
    .type-tm { background:var(--info-light);color:var(--info); }
    .type-fp { background:#f3e8ff;color:#7c3aed; }
    .health-badge { display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600; }
    .health-healthy { background:var(--success-light);color:var(--success); }
    .health-at-risk { background:var(--warning-light);color:var(--warning); }
    .health-critical { background:var(--error-light);color:var(--error); }
    .progress-bar-wrap { display:flex;align-items:center;gap:8px; }
    .progress-bar { flex:1;height:5px;background:var(--muted);border-radius:3px;overflow:hidden;min-width:60px; }
    .progress-fill { height:100%;border-radius:3px; }
    /* kpi grid */
    .kpi-grid-6 { display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:0; }
    .kpi-card { padding:16px;background:var(--card);border:1px solid var(--border);border-radius:8px; }
    .kpi-label { font-size:11px;color:var(--muted-fg);font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px; }
    .kpi-value { font-size:22px;font-weight:700;line-height:1;margin-bottom:4px; }
    .kpi-value.warn { color:var(--warning); }
    .kpi-value.danger { color:var(--error); }
    .kpi-value.success { color:var(--success); }
    .kpi-sub { font-size:12px;color:var(--muted-fg); }
    /* section collapsible */
    .collapsible { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden; }
    .collapsible-header { display:flex;align-items:center;justify-content:space-between;padding:13px 18px;cursor:pointer;border-bottom:1px solid transparent; }
    .collapsible-header:hover { background:var(--muted); }
    .collapsible-header.open { border-bottom-color:var(--border); }
    .collapsible-title { font-size:13px;font-weight:600; }
    .collapsible-body { padding:18px; }
    .chevron { transition:transform .2s; }
    .chevron.open { transform:rotate(180deg); }
    /* team table */
    .team-member-row { display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border); }
    .team-member-row:last-child { border-bottom:none; }
    .avatar-sm { width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0; }
    .util-bar-wrap { display:flex;align-items:center;gap:8px; }
    .util-bar { flex:1;height:5px;background:var(--muted);border-radius:3px;overflow:hidden;min-width:80px; }
    .util-fill { height:100%;border-radius:3px; }
    /* project detail header */
    .project-detail-header { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;margin-bottom:20px; }
    .pdh-top { display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px; }
    .pdh-name { font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--secondary); }
    .pdh-client { font-size:13px;color:var(--muted-fg);margin-top:4px; }
    .pdh-meta { display:flex;gap:10px;flex-wrap:wrap; }
    .meta-chip { padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500;background:var(--muted);color:var(--muted-fg); }
    /* empty */
    .empty-state { padding:50px 24px;text-align:center; }
    .empty-title { font-weight:600;margin-bottom:6px; }
    .empty-sub { font-size:13px;color:var(--muted-fg); }
    /* ending soon */
    .days-chip { display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700; }
    .days-critical { background:var(--error-light);color:var(--error); }
    .days-warn { background:var(--warning-light);color:var(--warning); }
    .days-ok { background:var(--success-light);color:var(--success); }
  </style>
</head>

  'users':'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  'bar-chart':'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
  'trending-up':'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',
  'shield':'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'
}

var params = new URLSearchParams(location.search)
var S = { scenario: params.get('scenario') || 'proj_dl_portfolio', role: null }
var _sc0 = SCREEN_DATA[S.scenario] || SCREEN_DATA['proj_dl_portfolio']
S.role = localStorage.getItem('rp_role') || _sc0.role
var sidebarCollapsed = false
var burndownChart = null
var _viewState = {}

var panelOpen = false
function togglePanel() {
  panelOpen = !panelOpen
  document.getElementById('state-panel').style.display = panelOpen ? 'block' : 'none'
}

function renderPanel() {
  var scenEl = document.getElementById('panel-scenarios')
  if (scenEl) scenEl.innerHTML = SCENARIOS.map(function(sc) {
    var active = sc.key === S.scenario
    return '<button onclick="setScenario(\'' + sc.key + '\')" style="padding:8px 11px;border-radius:6px;border:none;cursor:pointer;font-size:12px;text-align:left;width:100%;line-height:1.4;' +
      (active?'background:rgba(255,255,255,.15);color:#f9fafb;font-weight:600':'background:transparent;color:#9ca3af') + '">' + sc.label + '</button>'
  }).join('')
  var rolesEl = document.getElementById('panel-roles')
  if (rolesEl) rolesEl.innerHTML = Object.keys(ROLE_LABELS).map(function(r) {
    var active = r === S.role
    return '<button onclick="overrideRole(\'' + r + '\')" style="padding:5px 9px;border-radius:5px;border:1px solid;cursor:pointer;font-size:11px;' +
      (active?'background:rgba(255,255,255,.15);color:#f9fafb;border-color:rgba(255,255,255,.2);font-weight:600':'background:transparent;color:#6b7280;border-color:rgba(255,255,255,.08)') +
      '">' + ROLE_LABELS[r] + '</button>'
  }).join('')
}

function setScenario(key) {
  var sc = SCREEN_DATA[key]; if (!sc) return
  S.scenario = key; S.role = sc.role
  localStorage.setItem('rp_role', sc.role)
  history.replaceState(null, '', '?scenario=' + key)
  _viewState[key] = Object.assign({}, sc.data)
  renderPanel(); renderSidebar(); renderScreen()
}

function overrideRole(role) {
  S.role = role; localStorage.setItem('rp_role', role)
  renderPanel(); renderSidebar(); renderScreen()
}

function getVS() {
  var sc = SCREEN_DATA[S.scenario]
  if (!_viewState[S.scenario]) _viewState[S.scenario] = Object.assign({}, sc ? sc.data : { tab:'all' })
  return _viewState[S.scenario]
}

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed
  document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed)
  document.getElementById('header').classList.toggle('collapsed', sidebarCollapsed)
  document.getElementById('main').classList.toggle('collapsed', sidebarCollapsed)
}

function renderSidebar() {
  var items = NAV_CONFIG[S.role] || NAV_CONFIG['HR']
  document.getElementById('sidebar-nav').innerHTML = items.map(function(item) {
    var icon = NAV_ICONS[item.icon] || ''
    if (item.locked) return '<div class="nav-item locked"><span class="nav-icon">' + icon + '</span><span class="nav-label">' + item.label + '</span></div>'
    var isActive = item.file === 'project-composition.html'
    return '<a class="nav-item' + (isActive?' active':'') + '" href="' + item.file + '"><span class="nav-icon">' + icon + '</span><span class="nav-label">' + item.label + '</span></a>'
  }).join('')
  document.getElementById('sidebar-role-label').textContent = ROLE_LABELS[S.role] || S.role
  var email = localStorage.getItem('rp_email') || (S.role === 'HR' ? 'naomi.adler@halopowered.com' : S.role === 'ADMIN' ? 'admin@halopowered.com' : 'james.whitfield@halopowered.com')
  document.getElementById('sidebar-email').textContent = email
  document.getElementById('header-user').textContent = email
}

function renderScreen() {
  var vs = getVS()
  var el = document.getElementById('screen-content')
  if (burndownChart) { burndownChart.destroy(); burndownChart = null }
  if (!el) return

  var projects = S.role === 'HR' ? ALL_PROJECTS_HR : PROJECTS_DL

  var tabsHtml =
    '<div class="tabs">' +
      '<button class="tab-btn' + (vs.tab==='all'?' active':'') + '" onclick="switchTab(\'all\')">All Projects</button>' +
      '<button class="tab-btn' + (vs.tab==='detail'?' active':'') + '" onclick="switchTab(\'detail\')">Project Detail</button>' +
      '<button class="tab-btn' + (vs.tab==='ending'?' active':'') + '" onclick="switchTab(\'ending\')">Ending Soon <span style="background:var(--warning-light);color:var(--warning);padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;margin-left:4px">' + ENDING_SOON.length + '</span></button>' +
    '</div>'

  var body = ''
  if (vs.tab === 'all') body = buildAllProjects(projects, vs)
  else if (vs.tab === 'detail') body = buildProjectDetail(vs.projectId || (projects[0] && projects[0].id), projects)
  else if (vs.tab === 'ending') body = buildEndingSoon()

  el.innerHTML = tabsHtml + body

  if (vs.tab === 'detail') {
    setTimeout(function() {
      var pid = vs.projectId || (projects[0] && projects[0].id)
      var p = projects.find ? projects.find(function(x){return x.id===pid}) : null
      if (!p) p = projects[0]
      if (p && p.burndown && p.burndown.length > 0) renderBurndownChart(p)
    }, 60)
  }
}

function switchTab(tab) {
  var vs = getVS(); vs.tab = tab; renderScreen()
}

function openDetail(projectId) {
  var vs = getVS(); vs.tab = 'detail'; vs.projectId = projectId; renderScreen()
}

function buildAllProjects(projects, vs) {
  var rows = projects.map(function(p) {
    var healthCls = { 'healthy':'health-healthy', 'at-risk':'health-at-risk', 'critical':'health-critical' }[p.health] || 'health-healthy'
    var healthLabel = { 'healthy':'Healthy', 'at-risk':'At Risk', 'critical':'Critical' }[p.health] || p.health
    var barColor = p.pct >= 80 ? '#c0392b' : p.pct >= 60 ? '#c98b0a' : '#3d9a6b'
    var daysChip = p.daysLeft < 30 ? 'days-critical' : p.daysLeft < 60 ? 'days-warn' : 'days-ok'
    var typeCls = p.type === 'T&M' ? 'type-tm' : 'type-fp'
    return '<tr>' +
      '<td><span class="project-name-link" onclick="openDetail(\'' + p.id + '\')">' + p.name + '</span><div class="project-meta">' + p.client + ' · ' + p.pm + '</div></td>' +
      '<td><span class="type-badge ' + typeCls + '">' + p.type + '</span></td>' +
      '<td><span class="health-badge ' + healthCls + '"><span style="width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;display:inline-block;margin-right:4px"></span>' + healthLabel + '</span></td>' +
      '<td><div class="progress-bar-wrap"><div class="progress-bar"><div class="progress-fill" style="width:' + p.pct + '%;background:' + barColor + '"></div></div><span style="font-size:12px;font-weight:600;color:' + barColor + '">' + p.pct + '%</span></div></td>' +
      '<td style="font-size:12px;font-weight:600">$' + p.value.toLocaleString() + '</td>' +
      '<td><span class="days-chip ' + daysChip + '">' + p.daysLeft + 'd</span></td>' +
      '<td>' + p.headcount + '</td>' +
      '<td><button onclick="openDetail(\'' + p.id + '\')" style="padding:5px 12px;font-size:11px;border:1px solid var(--border);border-radius:5px;background:var(--card);cursor:pointer;font-family:inherit">Detail →</button></td>' +
    '</tr>'
  }).join('')
  return '<div class="section-card">' +
    '<div class="table-wrap"><table>' +
      '<thead><tr>' +
        '<th>Project</th><th>Type</th><th>Health</th>' +
        '<th style="min-width:140px">Budget Used</th>' +
        '<th>Contract Value</th><th>Days Left</th><th>Team</th><th></th>' +
      '</tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table></div>' +
  '</div>'
}

function buildProjectDetail(projectId, projects) {
  var p = null
  for (var i = 0; i < projects.length; i++) { if (projects[i].id === projectId) { p = projects[i]; break } }
  if (!p) p = projects[0]
  if (!p) return '<div class="empty-state"><div class="empty-title">No project selected</div><div class="empty-sub">Select a project from the All Projects tab.</div></div>'

  /* alert banners */
  var alerts = ''
  if (p.budgetAlert) {
    alerts += '<div class="alert-banner alert-error"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0;margin-top:1px"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>' +
      '<div><strong>Budget Run-out Alert:</strong> At current burn rate ($' + (p.kpis.burnRate||0).toLocaleString() + '/mo), this project will exhaust budget approximately 3 weeks before the contract end date. Review scope or request budget amendment.</div>' +
    '</div>'
  }
  if (p.scopeCreep) {
    alerts += '<div class="alert-banner alert-warn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
      '<div><strong>Scope Creep Detected:</strong> 3 change requests totaling +$45,000 have been approved but not yet reflected in the contract value. Update contract or reduce remaining scope.</div>' +
    '</div>'
  }
  if (p.risks && p.risks.length > 0 && !p.budgetAlert && !p.scopeCreep) {
    alerts += '<div class="alert-banner alert-warn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
      p.risks.join(' · ') + '</div>'
  }

  /* detail header */
  var healthCls = { 'healthy':'health-healthy','at-risk':'health-at-risk','critical':'health-critical' }[p.health] || 'health-healthy'
  var healthLabel = { 'healthy':'Healthy','at-risk':'At Risk','critical':'Critical' }[p.health] || p.health
  var typeCls = p.type === 'T&M' ? 'type-tm' : 'type-fp'
  var daysChip = p.daysLeft < 30 ? 'days-critical' : p.daysLeft < 60 ? 'days-warn' : 'days-ok'

  var detailHeader =
    '<div class="project-detail-header">' +
      '<div class="pdh-top">' +
        '<div>' +
          '<div class="pdh-name">' + p.name + '</div>' +
          '<div class="pdh-client">' + p.client + ' · PM: ' + p.pm + ' · Phase: ' + p.phase + '</div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<span class="health-badge ' + healthCls + '"><span style="width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;margin-right:4px"></span>' + healthLabel + '</span>' +
          '<span class="type-badge ' + typeCls + '">' + p.type + '</span>' +
          '<span class="days-chip ' + daysChip + '">' + p.daysLeft + ' days left</span>' +
        '</div>' +
      '</div>' +
      '<div class="pdh-meta">' +
        '<span class="meta-chip">Start: ' + p.start + '</span>' +
        '<span class="meta-chip">End: ' + p.end + '</span>' +
        '<span class="meta-chip">Team: ' + p.headcount + ' people</span>' +
        '<span class="meta-chip">Contract: $' + p.value.toLocaleString() + '</span>' +
      '</div>' +
    '</div>'

  /* financial KPIs */
  var kpis = p.kpis || {}
  var remaining = (kpis.contractValue||0) - (kpis.spent||0)
  var remainPct = kpis.contractValue ? Math.round(remaining / kpis.contractValue * 100) : 0
  var projectedOver = kpis.projectedFinal > kpis.contractValue
  var financialSection = buildCollapsible('financial', 'Financial KPIs',
    '<div class="kpi-grid-6">' +
      kpiCard2('Contract Value', '$'+(kpis.contractValue||0).toLocaleString(), '') +
      kpiCard2('Spent to Date', '$'+(kpis.spent||0).toLocaleString(), p.pct > 75 ? 'warn' : '') +
      kpiCard2('Remaining Budget', '$'+remaining.toLocaleString() + ' (' + remainPct + '%)', remainPct < 30 ? 'danger' : remainPct < 50 ? 'warn' : 'success') +
      kpiCard2('Billed Hours', (kpis.billedHours||0) + 'h of ' + (kpis.plannedHours||0) + 'h planned', '') +
      kpiCard2('Monthly Burn Rate', '$'+(kpis.burnRate||0).toLocaleString(), kpis.burnRate > 60000 ? 'warn' : '') +
      kpiCard2('Projected Final', '$'+(kpis.projectedFinal||0).toLocaleString(), projectedOver ? 'danger' : 'success') +
    '</div>', true)

  /* team composition */
  var teamRows = (p.team || []).map(function(m) {
    var barColor = m.alloc >= 80 ? '#3d9a6b' : m.alloc >= 50 ? '#c98b0a' : '#c0392b'
    var initials = m.name.split(' ').map(function(n){return n[0]}).join('').slice(0,2)
    return '<div class="team-member-row">' +
      '<div class="avatar-sm">' + initials + '</div>' +
      '<div style="flex:1"><div style="font-weight:600;font-size:13px"><a href="resource-profile.html?id=' + m.id + '" style="color:var(--fg);text-decoration:none" onmouseenter="this.style.color=\'var(--primary)\'" onmouseleave="this.style.color=\'var(--fg)\'">' + m.name + '</a></div><div style="font-size:11px;color:var(--muted-fg)">' + m.role + '</div></div>' +
      '<div class="util-bar-wrap" style="width:160px"><div class="util-bar"><div class="util-fill" style="width:' + m.alloc + '%;background:' + barColor + '"></div></div><span style="font-size:12px;font-weight:600;color:' + barColor + '">' + m.alloc + '%</span></div>' +
    '</div>'
  }).join('')
  var teamSection = buildCollapsible('team', 'Team Composition (' + (p.team||[]).length + ' members)', teamRows || '<div style="color:var(--muted-fg);font-size:13px">No team data.</div>', true)

  /* PTO impact */
  var ptoRows = (p.pto || []).map(function(pt) {
    return '<div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">' +
      '<div style="min-width:100px;font-size:12px;font-weight:600;color:var(--info)">📅 ' + pt.dates + '</div>' +
      '<div><div style="font-weight:600;font-size:13px">' + pt.name + '</div><div style="font-size:12px;color:var(--muted-fg)">' + pt.impact + '</div></div>' +
    '</div>'
  }).join('')
  var ptoSection = buildCollapsible('pto', 'PTO Impact' + (p.pto&&p.pto.length>0?' ('+p.pto.length+' upcoming)':''), ptoRows || '<div style="color:var(--muted-fg);font-size:13px">No PTO events in the next 30 days.</div>', false)

  /* budget burndown */
  var burndownSection = buildCollapsible('burndown', 'Budget Burndown',
    '<div style="position:relative;height:160px"><canvas id="burndown-canvas"></canvas></div>', true)

  /* past team */
  var pastRows2 = (p.pastTeam || []).map(function(m) {
    return '<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)">' +
      '<div style="flex:1"><div style="font-weight:600;font-size:13px">' + m.name + '</div><div style="font-size:11px;color:var(--muted-fg)">' + m.role + ' · ' + m.period + ' · ' + m.alloc + '% alloc</div></div>' +
    '</div>'
  }).join('')
  var pastTeamSection = buildCollapsible('past-team', 'Past Team Members', pastRows2 || '<div style="color:var(--muted-fg);font-size:13px">No past team members.</div>', false)

  return detailHeader + alerts + financialSection + teamSection + ptoSection + burndownSection + pastTeamSection
}

function buildCollapsible(id, title, body, defaultOpen) {
  return '<div class="collapsible" id="col-' + id + '">' +
    '<div class="collapsible-header' + (defaultOpen?' open':'') + '" onclick="toggleCollapsible(\'' + id + '\')">' +
      '<span class="collapsible-title">' + title + '</span>' +
      '<svg id="chev-' + id + '" class="chevron' + (defaultOpen?' open':'') + '" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>' +
    '</div>' +
    '<div id="body-' + id + '" class="collapsible-body" style="' + (defaultOpen?'':'display:none') + '">' + body + '</div>' +
  '</div>'
}

function toggleCollapsible(id) {
  var body = document.getElementById('body-' + id)
  var header = document.querySelector('#col-' + id + ' .collapsible-header')
  var chev = document.getElementById('chev-' + id)
  var open = body.style.display !== 'none'
  body.style.display = open ? 'none' : ''
  if (header) header.classList.toggle('open', !open)
  if (chev) chev.classList.toggle('open', !open)
  if (!open && id === 'burndown') {
    var vs = getVS()
    var projects = S.role === 'HR' ? ALL_PROJECTS_HR : PROJECTS_DL
    var projectId = vs.projectId || (projects[0] && projects[0].id)
    var p = null
    for (var i = 0; i < projects.length; i++) { if (projects[i].id === projectId) { p = projects[i]; break } }
    if (p) setTimeout(function() { renderBurndownChart(p) }, 30)
  }
}

function kpiCard2(label, val, cls) {
  return '<div class="kpi-card"><div class="kpi-label">' + label + '</div><div class="kpi-value ' + cls + '">' + val + '</div></div>'
}

function renderBurndownChart(p) {
  var canvas = document.getElementById('burndown-canvas')
  if (!canvas) return
  if (burndownChart) { burndownChart.destroy(); burndownChart = null }
  var bd = p.burndown || []
  var labels = bd.map(function(d){ return d.month })
  var planned = bd.map(function(d){ return d.planned / 1000 })
  var actual = bd.map(function(d){ return d.actual != null ? d.actual / 1000 : null })
  burndownChart = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label:'Planned ($K)', data:planned, borderColor:'#2563aa', backgroundColor:'rgba(37,99,170,.08)', tension:.3, borderWidth:2, borderDash:[], pointRadius:3 },
        { label:'Actual ($K)', data:actual, borderColor:'#d95f2b', backgroundColor:'rgba(217,95,43,.08)', tension:.3, borderWidth:2.5, pointRadius:4, spanGaps:false }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      scales: {
        x: { grid:{display:false}, ticks:{font:{size:11}} },
        y: { ticks:{callback:function(v){return '$'+v+'K'},font:{size:11}}, grid:{color:'#e5e1da'} }
      },
      plugins: {
        legend:{position:'top',labels:{font:{size:11},boxWidth:12}},
        tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': $'+ctx.raw+'K'}}}
      }
    }
  })
}

function buildEndingSoon() {
  if (ENDING_SOON.length === 0) {
    return '<div class="section-card"><div class="empty-state"><div class="empty-title">No projects ending soon</div><div class="empty-sub">No active projects end within the next 90 days.</div></div></div>'
  }
  var rows = ENDING_SOON.map(function(p) {
    var daysChip = p.daysLeft < 30 ? 'days-critical' : p.daysLeft < 60 ? 'days-warn' : 'days-ok'
    var typeCls = p.type === 'T&M' ? 'type-tm' : 'type-fp'
    return '<tr>' +
      '<td><span class="project-name-link" onclick="openDetail(\'' + p.id + '\')">' + p.name + '</span><div class="project-meta">' + p.client + '</div></td>' +
      '<td><span class="type-badge ' + typeCls + '">' + p.type + '</span></td>' +
      '<td style="font-size:12px;color:var(--muted-fg)">' + p.end + '</td>' +
      '<td><span class="days-chip ' + daysChip + '">' + p.daysLeft + ' days</span></td>' +
      '<td style="font-size:12px">' + p.headcount + ' members</td>' +
      '<td style="font-size:12px;font-weight:600">$' + ((p.kpis && p.kpis.contractValue || p.value) - (p.kpis && p.kpis.spent || p.spent)).toLocaleString() + ' remaining</td>' +
    '</tr>'
  }).join('')
  return '<div class="section-card">' +
    '<div class="table-wrap"><table>' +
      '<thead><tr><th>Project</th><th>Type</th><th>End Date</th><th>Time Left</th><th>Team Size</th><th>Budget Remaining</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table></div>' +
  '</div>'
}

document.addEventListener('DOMContentLoaded', function() {
  renderPanel(); renderSidebar(); renderScreen()
})
</script>
</body>
</html>
