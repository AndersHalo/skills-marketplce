name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Validate all skills
        run: npm run validate

      - name: Bump plugin versions
        run: npm run bump:versions

      - name: Generate skills manifest
        run: npm run build:manifest

      - name: Commit version bumps and manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add platforms/marketplace.yaml skills-manifest.json
          git diff --cached --quiet || git commit -m "chore: bump plugin versions and update manifest [skip ci]"
          git push

      - name: Generate marketplace plugins
        run: npm run build:plugins

      - name: Push to marketplace-ai
        uses: cpina/github-action-push-to-another-repository@v1.7.3
        env:
          SSH_DEPLOY_KEY: ${{ secrets.MARKETPLACE_DEPLOY_KEY }}
        with:
          source-directory: 'dist/'
          destination-github-username: 'AndersHalo'
          destination-repository-name: 'marketplace-ai'
          target-branch: main
          commit-message: 'release: ${{ github.sha }}'
